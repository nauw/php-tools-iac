apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: php-tools
  namespace: php-tools
  labels:
    app.kubernetes.io/name: php-tools
    app.kubernetes.io/instance: php-tools
    app.kubernetes.io/managed-by: argocd
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: php-tools.example.com   # Replace with your actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: php-tools
                port:
                  name: http
