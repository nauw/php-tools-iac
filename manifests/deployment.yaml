apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-tools
  namespace: php-tools
  labels:
    app.kubernetes.io/name: php-tools
    app.kubernetes.io/instance: php-tools
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: php-tools
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: php-tools
        app.kubernetes.io/instance: php-tools
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: php-tools
          image: docker.io/nauw/php-tools:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
